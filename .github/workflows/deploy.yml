name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all frontend apps
        run: pnpm build

      - name: Setup SSH agent with deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Deploy frontend via rsync
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-65002}"
          # accept-new agrega la host key al primer encuentro sin prompt,
          # evita un step separado de ssh-keyscan (que Hostinger a veces filtra
          # desde IPs de cloud providers como GitHub Actions runners).
          SSH_CMD="ssh -p $PORT -o StrictHostKeyChecking=accept-new"
          TARGET="$SSH_USER@$SSH_HOST"
          ROOT="~/domains/prooq.com/public_html"

          # Portal en raiz del dominio. NO --delete para preservar /api (subdir
          # del subdominio api.prooq.com) + cualquier archivo gestionado por
          # Hostinger (.ssl.txt, .htaccess auto-generado, etc).
          rsync -av -e "$SSH_CMD" \
            --exclude pty --exclude usa --exclude esp --exclude ven --exclude api \
            apps/portal/dist/ "$TARGET:$ROOT/"

          # 4 sucursales en subcarpetas dedicadas (--delete OK)
          for country in pty usa esp ven; do
            rsync -av --delete -e "$SSH_CMD" \
              "apps/$country/dist/" "$TARGET:$ROOT/$country/"
          done

      - name: Deploy API via rsync
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-65002}"
          SSH_CMD="ssh -p $PORT -o StrictHostKeyChecking=accept-new"
          # api.prooq.com tiene su document root en public_html/api/public,
          # entonces el resto del Slim (src/, vendor/, composer.json) vive a
          # nivel api/ (un dir arriba), fuera del directorio web-accessible.
          API_ROOT="$SSH_USER@$SSH_HOST:~/domains/prooq.com/public_html/api"

          # 1) api/public/ → ~/.../api/public/ (web-accessible)
          # NO usar --delete porque .env vive ahi y no esta en el repo.
          rsync -av --exclude '.env' -e "$SSH_CMD" \
            api/public/ "$API_ROOT/public/"

          # 2) api/src/ → ~/.../api/src/ (no expuesto, fuera del docroot)
          rsync -av --delete -e "$SSH_CMD" \
            api/src/ "$API_ROOT/src/"

          # 3) composer files (sin vendor — composer install corre en remote)
          rsync -av -e "$SSH_CMD" \
            api/composer.json api/composer.lock "$API_ROOT/"

      - name: Install PHP deps on remote
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            cd ~/domains/prooq.com/public_html/api
            composer install --no-dev --optimize-autoloader --no-interaction
