name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            cd ~/prooq && git pull
            # Portal en la raiz; --delete-excluded NO se usa aqui para preservar
            # /pty, /usa, /esp, /ven y /api que rsync no debe tocar.
            rsync -av --delete --exclude pty --exclude usa --exclude esp --exclude ven --exclude api \
                apps/portal/dist/ ~/public_html/
            rsync -av --delete apps/pty/dist/ ~/public_html/pty/
            rsync -av --delete apps/usa/dist/ ~/public_html/usa/
            rsync -av --delete apps/esp/dist/ ~/public_html/esp/
            rsync -av --delete apps/ven/dist/ ~/public_html/ven/
            cd ~/domains/api.prooq.com && composer install --no-dev --optimize-autoloader
